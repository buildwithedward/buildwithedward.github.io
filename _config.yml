title: "Build With Edward"
subtitle: "AI, ML, and Scalable System Design in Production"
name: "Edward"
description: "180-day hands-on journey through Deep Learning and LLM Systems"
url: "https://buildwithedward.github.io"
baseurl: ""

theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "dark"

# Author
author:
  name: "Edward"
  avatar: "/assets/img/edward.jpg"
  bio: "AI/ML Architect specializing in AWS & LLM Systems"
  location: "India"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/buildwithedward"

# Reading Files
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-paginate

# Pagination
paginate: 10
paginate_path: /page:num/

# Outputting
timezone: Asia/Kolkata

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Category archive
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

include:
  - _pages
